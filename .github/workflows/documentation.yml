name: Documentation Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "README.md"
      - "Doxyfile"
      - "include/**"
      - "src/**"
      - "docs/**"
      - "LICENSING.md"
      - "CONTRIBUTING.md"
      - "tools/build-documentation.py"
      - ".github/workflows/documentation.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "Doxyfile"
      - "include/**"
      - "src/**"
      - "docs/**"
      - "LICENSING.md"
      - "CONTRIBUTING.md"
      - "tools/build-documentation.py"
      - ".github/workflows/documentation.yml"

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  manual:
    name: Markdown and PDF manual
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install documentation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            doxygen \
            graphviz \
            latexmk \
            make \
            texlive-fonts-recommended \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-latex-recommended \
            texlive-pictures \
            texlive-plain-generic

      - name: Show tool versions
        run: |
          doxygen --version
          dot -V
          latexmk -version | head -n 2
          pdflatex --version | head -n 1
          makeindex --version | head -n 1

      - name: Run documentation audits
        run: |
          python tools/check-public-docs.py
          python tools/check-maintainability-docs.py

      - name: Build Markdown and PDF documentation
        run: python tools/build-documentation.py

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v7
        with:
          name: project-documentation
          path: |
            dist/*-markdown-docs.zip
            dist/*-manual.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Upload documentation diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: documentation-diagnostics
          path: |
            docs/generated/logs/*.log
            docs/generated/doxygen-warnings.log
            docs/generated/latex/*.log
          if-no-files-found: ignore
          retention-days: 7
