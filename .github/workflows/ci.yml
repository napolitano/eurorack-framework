name: Quality

on:
  push:
    branches:
      - main
      - "develop/**"
      - "feature/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  documentation-audits:
    name: Documentation audits
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Audit public API documentation
        run: python tools/check-public-docs.py

      - name: Audit maintainability documentation
        run: python tools/check-maintainability-docs.py

      - name: Build Markdown documentation artifact
        run: python tools/build-documentation.py --markdown-only

  licensing:
    name: Licensing audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Audit license files and SPDX metadata
        run: python tools/check-licensing.py

  static-analysis:
    name: Formatting and static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            clang-format \
            cppcheck

      - name: Check clang-format
        run: |
          find include src tests examples \
            -type f \
            \( -name '*.hpp' -o -name '*.h' -o -name '*.cpp' \) \
            -print0 |
          xargs -0 clang-format --dry-run --Werror

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --std=c++17 \
            -I include \
            src
