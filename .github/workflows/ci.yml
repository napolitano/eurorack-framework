name: Quality

on:
  push:
    branches:
      - main
      - "develop/**"
      - "feature/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  documentation-audits:
    name: Documentation audits
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate granular library layout
        run: python tools/check-library-layout.py

      - name: Audit public API documentation
        run: python tools/check-public-docs.py

      - name: Audit maintainability documentation
        run: python tools/check-maintainability-docs.py

      - name: Audit Doxygen declaration contracts
        run: python tools/check-doxygen-contracts.py

      - name: Build Markdown documentation artifact
        run: python tools/build-documentation.py --markdown-only

  licensing:
    name: Licensing audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Audit license files and SPDX metadata
        run: python tools/check-licensing.py

  static-analysis:
    name: Formatting and static analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends clang-format cppcheck

      - name: Show analysis tool versions
        run: |
          clang-format --version
          cppcheck --version

      - name: Check source formatting
        run: |
          python tools/check-format.py
          find examples \
            -type f \
            \( -name '*.hpp' -o -name '*.h' -o -name '*.cpp' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --inline-suppr \
            --std=c++17 \
            -D__AVR__ \
            -DF_CPU=16000000UL \
            $(find libraries -maxdepth 4 -type d -name include -printf '-I%p ') \
            libraries
