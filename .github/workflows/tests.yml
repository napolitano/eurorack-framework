name: Tests

on:
  push:
    branches: [main, "develop/**", "feature/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  native:
    name: Native tests (${{ matrix.compiler }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Validate library layout
        run: python tools/check-library-layout.py
      - name: Run strict native tests
        run: python tools/run-native-tests.py --compiler "${{ matrix.compiler }}"

  sanitizers:
    name: Sanitizers (${{ matrix.suite }})
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite:
          - test_driver_74hc4051_4067
          - test_driver_74hc165
          - test_driver_74hc595
          - test_driver_dac8568
          - test_driver_mcp23017
          - test_driver_mcp3208
          - test_driver_mcp4822
          - test_driver_mcp4922
          - test_driver_sh1106
          - test_driver_ssd1306
          - test_driver_tlc5916
          - test_driver_tlc5947
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run ASan and UBSan
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: >-
          python tools/run-native-tests.py
          --compiler g++
          --filter "${{ matrix.suite }}"
          --sanitizers

  component-examples:
    name: Native component examples
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Build and execute component examples
        run: python tools/build-examples.py
