name: Builds

on:
  push:
    branches:
      - main
      - "develop/**"
      - "feature/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: builds-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  platformio-native:
    name: PlatformIO native integration
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Validate granular library layout
        run: python tools/check-library-layout.py

      - name: Build root native smoke target
        run: pio run -e native

      - name: Run PlatformIO native tests
        run: pio test -e native

  nano-r3-attenuverter:
    name: Arduino Nano R3 attenuverter build
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Test pure attenuverter model
        working-directory: examples/projects/nano-r3-attenuverter
        run: |
          g++ \
            -std=c++17 \
            -Wall \
            -Wextra \
            -Wpedantic \
            -Wconversion \
            -Wsign-conversion \
            -Werror \
            native/model_test.cpp \
            -o /tmp/attenuverter-model-test
          /tmp/attenuverter-model-test

      - name: Build Nano R3 example
        working-directory: examples/projects/nano-r3-attenuverter
        run: pio run

  nano-r3-oled-controller:
    name: Arduino Nano R3 OLED controller build
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Validate granular library layout
        run: python tools/check-library-layout.py

      - name: Build Nano R3 OLED controller example
        working-directory: examples/projects/nano-r3-oled-controller
        run: pio run
