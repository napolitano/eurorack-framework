name: Development Artifacts

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run the native test suite before packaging"
        required: true
        default: true
        type: boolean
      build_pdf:
        description: "Build the PDF manual"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  package:
    name: Build unreleased development artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging and documentation tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            doxygen \
            graphviz \
            make \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Build complete artifacts
        if: ${{ inputs.run_tests && inputs.build_pdf }}
        run: python tools/build-artifacts.py

      - name: Build artifacts without tests
        if: ${{ !inputs.run_tests && inputs.build_pdf }}
        run: python tools/build-artifacts.py --skip-tests

      - name: Build Markdown-only artifacts
        if: ${{ inputs.run_tests && !inputs.build_pdf }}
        run: python tools/build-artifacts.py --markdown-only

      - name: Build Markdown-only artifacts without tests
        if: ${{ !inputs.run_tests && !inputs.build_pdf }}
        run: |
          python tools/build-artifacts.py \
            --skip-tests \
            --markdown-only

      - name: Upload development artifacts
        uses: actions/upload-artifact@v7
        with:
          name: eurorack-framework-unreleased
          path: |
            dist/*.zip
            dist/*.pdf
            dist/*.sha256
          if-no-files-found: error
          retention-days: 30
