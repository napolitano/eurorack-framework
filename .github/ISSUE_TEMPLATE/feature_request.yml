name: Feature request
description: Propose a framework component, backend, driver, or API improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the concrete firmware-development problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behavior you propose.
    validations:
      required: true
  - type: textarea
    id: platforms
    attributes:
      label: Relevant platforms or hardware
