name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the observed behavior and the expected behavior.
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Target platform and board
      placeholder: "ATmega328P / Arduino Nano"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest practical reproduction.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Build output and diagnostics
      render: shell
