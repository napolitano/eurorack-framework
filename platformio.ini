; Eurorack Framework
; Root build and native test configuration

[platformio]
default_envs = native
test_dir = tests/native

[env]
build_type = release
build_src_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wpedantic
    -Wconversion
    -Wsign-conversion
    -Wshadow
    -Wundef
    -Wformat=2
    -Wnull-dereference
    -Wdouble-promotion
    -Werror
lib_ldf_mode = deep+

[env:native]
platform = native
test_framework = unity
test_build_src = true

; PlatformIO compiles its generated Unity C support with the environment
; warning flags. Unity 2.x contains intentional char/int conversions that
; trigger GCC's conversion diagnostics. Keep every other warning fatal while
; preventing third-party Unity code from failing the framework test build.
;
; Framework sources remain fully checked with -Wconversion,
; -Wsign-conversion, and -Werror by tools/run-native-tests.py and CI.
build_flags =
    -Wno-error=conversion
    -Wno-error=sign-conversion
