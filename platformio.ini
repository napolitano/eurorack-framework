; Eurorack Framework
; Root PlatformIO configuration
;
; The root project is used primarily for native tests. Embedded environments
; below are intentionally commented out because they are examples of supported
; configuration patterns, not a claim that every board is already validated.
;
; To activate one target:
;
; 1. remove the leading semicolons from the complete environment block
; 2. add the environment name to default_envs, or run:
;
;       pio run -e <environment-name>
;
; 3. verify the board ID against the installed PlatformIO registry
; 4. add a board-specific smoke-test source or consuming firmware project
;
; Public framework headers remain platform-independent. Arduino adapters are
; available only when the ARDUINO macro is supplied by an Arduino framework
; environment.

[platformio]
default_envs = native
test_dir = tests/native
lib_extra_dirs = libraries

; ---------------------------------------------------------------------------
; Shared host-build settings
; ---------------------------------------------------------------------------
;
; These diagnostics are intentionally strict for framework-owned C++ sources.
; Embedded toolchains differ in warning support, so embedded environments below
; inherit only settings that have been verified as portable enough for the
; selected platform.
;
; PlatformIO's third-party Unity C sources are handled separately in the native
; environment because they contain conversions that are harmless for Unity but
; would otherwise fail under the framework's C++ warning policy.

[env]
build_type = release
lib_ldf_mode = deep+

build_src_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wpedantic
    -Wconversion
    -Wsign-conversion
    -Wshadow
    -Wundef
    -Wformat=2
    -Wnull-dereference
    -Wdouble-promotion
    -Werror

; ---------------------------------------------------------------------------
; Native host tests - active by default
; ---------------------------------------------------------------------------

[env:native]
platform = native
test_framework = unity
test_build_src = true
lib_deps =
    eurorack-compat
    eurorack-core
    eurorack-io
    eurorack-controls
    eurorack-display
    eurorack-drivers-led-interface
    eurorack-drivers-led
    eurorack-drivers-dac
    eurorack-drivers-gpio
    eurorack-drivers-shift
    eurorack-drivers-mux
    eurorack-drivers-display
    eurorack-storage
    eurorack-simulation

; PlatformIO compiles generated Unity support as C. Unity intentionally passes
; char and unsigned values through generic callbacks, which triggers GCC's
; conversion diagnostics. Only those two warnings are prevented from becoming
; fatal for dependency code.
;
; Framework sources remain fully checked with conversion warnings and -Werror by
; tools/run-native-tests.py and CI.
build_flags =
    -Wno-error=conversion
    -Wno-error=sign-conversion

; ===========================================================================
; OPTIONAL EMBEDDED ENVIRONMENTS
; ===========================================================================
;
; These blocks are documentation templates. They remain commented out until the
; project has board-specific compile tests and hardware validation.
;
; A consuming firmware repository should normally define its own active board
; environments and include this framework as a library dependency.

; ---------------------------------------------------------------------------
; Arduino Nano R3 - ATmega328P, classic bootloader
; ---------------------------------------------------------------------------
;
; Board ID: nanoatmega328
; Platform: Atmel AVR
; Framework: Arduino
;
; Use this for many original or compatible Nano boards with the older
; bootloader. Upload speed may differ between clone variants.
;
; Severe limits apply:
;
; - approximately 2 KiB SRAM
; - approximately 30 KiB usable flash
; - no hardware floating-point unit
; - no true DAC
;
; Not every framework subsystem is expected to fit simultaneously.
;
; [env:nano-r3]
; platform = atmelavr
; board = nanoatmega328
; framework = arduino
; lib_ldf_mode = deep+
; build_flags =
;     -std=gnu++17
;     -Wall
;     -Wextra
;     -Wpedantic

; ---------------------------------------------------------------------------
; Arduino Nano R3 - ATmega328P, new bootloader
; ---------------------------------------------------------------------------
;
; Board ID: nanoatmega328new
;
; Use this for Nano boards using the newer bootloader and upload settings.
;
; [env:nano-r3-new-bootloader]
; platform = atmelavr
; board = nanoatmega328new
; framework = arduino
; lib_ldf_mode = deep+
; build_flags =
;     -std=gnu++17
;     -Wall
;     -Wextra
;     -Wpedantic

; ---------------------------------------------------------------------------
; Arduino Nano R4 - Renesas RA4M1
; ---------------------------------------------------------------------------
;
; Board ID: nano_r4
; Platform: Renesas RA
; MCU: RA4M1, Cortex-M4
;
; This is a materially more capable target than the Nano R3. It provides more
; flash and SRAM and is a useful candidate for future framework validation.
;
; [env:nano-r4]
; platform = renesas-ra
; board = nano_r4
; framework = arduino
; lib_ldf_mode = deep+
; build_flags =
;     -std=gnu++17
;     -Wall
;     -Wextra
;     -Wpedantic

; ---------------------------------------------------------------------------
; Arduino Nano ESP32 - ESP32-S3
; ---------------------------------------------------------------------------
;
; Board ID: arduino_nano_esp32
; Platform: Espressif 32
; MCU: ESP32-S3
;
; Suitable for larger examples, networking experiments, and significantly more
; memory than AVR. Wi-Fi and Bluetooth are platform facilities, not framework
; assumptions.
;
; [env:nano-esp32]
; platform = espressif32
; board = arduino_nano_esp32
; framework = arduino
; lib_ldf_mode = deep+
; monitor_speed = 115200
; build_flags =
;     -std=gnu++17
;     -Wall
;     -Wextra
;     -Wpedantic

; ---------------------------------------------------------------------------
; STM32 Nucleo F411RE - representative STM32F4 target
; ---------------------------------------------------------------------------
;
; Board ID: nucleo_f411re
; Platform: ST STM32
; MCU: STM32F411RE, Cortex-M4F
;
; This is the preferred documented STM32 example because PlatformIO provides a
; maintained board definition and the Nucleo board has a predictable debug and
; upload path.
;
; [env:stm32-nucleo-f411re]
; platform = ststm32
; board = nucleo_f411re
; framework = arduino
; lib_ldf_mode = deep+
; upload_protocol = stlink
; debug_tool = stlink
; build_flags =
;     -std=gnu++17
;     -Wall
;     -Wextra
;     -Wpedantic

; ---------------------------------------------------------------------------
; STM32F407VET6 "Black" development board
; ---------------------------------------------------------------------------
;
; Common PlatformIO board ID: black_f407ve
;
; Chinese STM32F407VET6 boards vary in oscillator, USB wiring, flash devices,
; display wiring, boot configuration, and even fitted MCU authenticity. Treat
; this environment as a starting point only. Confirm the actual schematic and
; board manifest before upload.
;
; [env:stm32f407vet6-black]
; platform = ststm32
; board = black_f407ve
; framework = arduino
; lib_ldf_mode = deep+
; upload_protocol = stlink
; debug_tool = stlink
; build_flags =
;     -std=gnu++17
;     -Wall
;     -Wextra
;     -Wpedantic

; ---------------------------------------------------------------------------
; Raspberry Pi Pico - RP2040
; ---------------------------------------------------------------------------
;
; Board ID: pico
; Platform: Raspberry Pi RP2040
;
; Useful for dual-core and PIO experiments. The standard PlatformIO Raspberry Pi
; platform is shown here. A project using an alternative Arduino-Pico core needs
; a different platform declaration and should document that choice explicitly.
;
; [env:raspberry-pi-pico]
; platform = raspberrypi
; board = pico
; framework = arduino
; lib_ldf_mode = deep+
; build_flags =
;     -std=gnu++17
;     -Wall
;     -Wextra
;     -Wpedantic

; ---------------------------------------------------------------------------
; Arduino Nano RP2040 Connect
; ---------------------------------------------------------------------------
;
; Board ID: nanorp2040connect
; Platform: Raspberry Pi RP2040
;
; [env:nano-rp2040-connect]
; platform = raspberrypi
; board = nanorp2040connect
; framework = arduino
; lib_ldf_mode = deep+
; build_flags =
;     -std=gnu++17
;     -Wall
;     -Wextra
;     -Wpedantic

; ---------------------------------------------------------------------------
; Arduino Nano 33 IoT - SAMD21
; ---------------------------------------------------------------------------
;
; Board ID: nano_33_iot
; Platform: Atmel SAM
; MCU: ATSAMD21G18A, Cortex-M0+
;
; This remains a useful lower-power 32-bit Arduino target but has less RAM and
; processing headroom than STM32F4, RA4M1, ESP32-S3, or RP2040.
;
; [env:nano-33-iot]
; platform = atmelsam
; board = nano_33_iot
; framework = arduino
; lib_ldf_mode = deep+
; build_flags =
;     -std=gnu++17
;     -Wall
;     -Wextra
;     -Wpedantic

; ---------------------------------------------------------------------------
; Optional compile-only smoke-test pattern
; ---------------------------------------------------------------------------
;
; The root repository does not yet provide one universal embedded main.cpp.
; When adding a real board matrix, prefer a dedicated smoke-test project or an
; example-specific PlatformIO environment rather than pretending that a library
; build alone proves runtime compatibility.
;
; A future CI matrix should initially validate:
;
; - Arduino Nano R3
; - Arduino Nano R4
; - Arduino Nano ESP32
; - STM32 Nucleo F411RE
; - Raspberry Pi Pico
;
; Hardware qualification remains separate from successful compilation.
