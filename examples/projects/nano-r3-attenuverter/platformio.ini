[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino

; The example is located three directory levels below the repository root.
; Add only the public include directory. `src/framework_subset.cpp` selects the
; small set of implementation units required by this ATmega328P demonstration.
build_flags =
    -Icompat
    -std=gnu++17
    -Wall
    -Wextra
    -Wpedantic
    -I../../../include

; Do not scan the repository as one monolithic PlatformIO library. That would
; compile native simulation and unrelated subsystems into a 2 KiB SRAM target.
lib_ldf_mode = chain+
monitor_speed = 115200
