[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino

; Arduino AVR adds `-std=gnu++11` by default. The framework requires C++17, so
; remove the platform default before adding `-std=gnu++17` below. Merely adding
; a second `-std` flag is not reliable because command-line ordering determines
; which language mode wins.
build_unflags =
    -std=gnu++11

build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wpedantic
    -Wno-error=pedantic

; Arduino AVR's own bundled SPI.h (SPIClass::transfer16) uses an anonymous struct inside a
; union, which -Wpedantic correctly flags as a non-standard extension but which this project
; cannot fix (it is vendored Arduino-core code, not framework or example code). -Wpedantic
; stays enabled as a diagnostic for the example's own sources; only this one specific warning
; class is prevented from becoming a hard build failure.

; The framework repository is checked out three directory levels above this
; example (adjust to match your own submodule/subrepository layout). Pointing
; lib_extra_dirs at its libraries/ folder makes every individual component
; library available by name below. No local compat/ shim directory and no
; framework_subset.cpp are needed: the framework's own eurorack-compat library
; supplies the AVR standard-library shims automatically via __AVR__, and only
; the libraries actually listed in lib_deps are compiled and linked.
lib_extra_dirs = ../../../libraries
lib_deps =
    eurorack-compat
    eurorack-core
    eurorack-io
    eurorack-drivers-led-interface
    eurorack-controls
    eurorack-drivers-dac
    eurorack-storage
    eurorack-platform-arduino

; Do not scan the repository as one monolithic PlatformIO library. That would
; compile native simulation and unrelated subsystems into a 2 KiB SRAM target.
lib_ldf_mode = chain+
monitor_speed = 115200
